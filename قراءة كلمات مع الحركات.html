<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لعبة الكلمات - المعلمة نور الهدى الدح</title>
    <style>
        :root {
            --pastel-pink: #FFD1DC;
            --pastel-blue: #BDE0FE;
            --pastel-green: #CAFFBF;
            --pastel-yellow: #FDFFB6;
            --pastel-purple: #E2C6FF;
            --dark-text: #4A4A4A;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #fdfcf0;
            color: var(--dark-text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        /* اسم المعلمة */
        .teacher-name {
            background: var(--pastel-pink);
            padding: 10px 30px;
            border-radius: 0 0 30px 30px;
            font-size: 1.4rem;
            font-weight: bold;
            color: #d81b60;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 2px solid white;
            margin-top: -20px;
        }

        .tabs {
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
        }

        .tab-btn {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: white;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
            font-size: 1.1rem;
        }

        .tab-btn.active {
            background: var(--pastel-blue);
            transform: scale(1.1);
        }

        .game-card {
            display: none;
            background: white;
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.05);
            width: 90%;
            max-width: 800px;
            text-align: center;
            border: 8px solid var(--pastel-yellow);
        }

        .game-card.active { display: block; }

        /* XO Styling */
        .xo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 25px 0;
        }

        .cell {
            aspect-ratio: 1.2;
            background: var(--pastel-purple);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.2rem;
            cursor: pointer;
            border: 5px solid white;
            transition: 0.3s;
        }
        .cell:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .cell.occupied { pointer-events: none; }
        .cell.x { background: var(--pastel-pink) !important; color: #d81b60; font-weight: bold; }
        .cell.o { background: var(--pastel-blue) !important; color: #0077b6; font-weight: bold; }

        /* Drag & Drop Styling */
        .word-box {
            font-size: 4rem;
            margin: 30px 0;
            padding: 20px;
            background: #fff9f9;
            border-radius: 20px;
            display: inline-block;
        }

        .slots-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 40px 0;
            min-height: 100px;
        }

        .slot {
            width: 90px;
            height: 90px;
            border: 4px dashed var(--pastel-blue);
            border-radius: 20px;
            background: #fbfbfb;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            transition: 0.3s;
        }

        .options-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 30px;
            padding: 20px;
        }

        .chip {
            padding: 15px 30px;
            background: var(--pastel-green);
            border-radius: 25px;
            cursor: grab;
            font-size: 2.5rem;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            user-select: none;
            touch-action: none;
        }

        .chip:active { cursor: grabbing; }

        .message { font-size: 1.5rem; margin: 20px 0; font-weight: bold; color: #ff8fa3; height: 30px;}
        
        button.action-btn {
            background: var(--pastel-pink);
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 0 #ffb6c1;
        }
        button.action-btn:active { transform: translateY(4px); box-shadow: none; }

    </style>
</head>
<body>

    <div class="teacher-name">المعلمة: نور الهدى الدح 🌸</div>

    <h1 style="color: #6d597a; text-shadow: 2px 2px #fff; margin-top: 10px;">✨ مغامرتي مع الكلمات ✨</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab(0)">1. لعبة X O</button>
        <button class="tab-btn" onclick="switchTab(1)">2. تحليل الكلمات</button>
        <button class="tab-btn" onclick="switchTab(2)">3. المقطع الناقص</button>
    </div>

    <div id="p1" class="game-card active">
        <h2>اقرأ الكلمة ثم ضع علامتك</h2>
        <h3 id="xo-info">دور اللاعب: X</h3>
        <div class="xo-grid" id="xoGrid"></div>
        <button class="action-btn" onclick="buildXO()">تصفير اللعبة</button>
    </div>

    <div id="p2" class="game-card">
        <h2>حلّل الكلمة بسحب الحرف مع حركته</h2>
        <div class="word-box" id="a-word-display"></div>
        <div class="slots-container" id="a-slots"></div>
        <div class="options-container" id="a-options"></div>
        <div class="message" id="a-msg"></div>
        <button class="action-btn" onclick="nextA()">الكلمة التالية ➡️</button>
    </div>

    <div id="p3" class="game-card">
        <h2>اسحب المقطع الناقص لتكمل الكلمة</h2>
        <div class="word-box" id="c-word-display"></div>
        <div class="options-container" id="c-options"></div>
        <div class="message" id="c-msg"></div>
        <button class="action-btn" onclick="nextC()">الكلمة التالية ➡️</button>
    </div>

    <script>
        // الكلمات (ثلاثية، بالتشكيل، بدون همزات)
        const myWords = ["دَرَسَ", "رَسَمَ", "فَتَحَ", "لَعِبَ", "شَرِبَ", "خَرَجَ", "مَسَحَ", "حَصَدَ", "سَبَحَ"];
        let xoTurn = 'x';

        function switchTab(i) {
            document.querySelectorAll('.game-card').forEach((c, idx) => c.classList.toggle('active', i === idx));
            document.querySelectorAll('.tab-btn').forEach((b, idx) => b.classList.toggle('active', i === idx));
        }

        // --- الجزء 1: XO ---
        function buildXO() {
            const g = document.getElementById('xoGrid');
            g.innerHTML = '';
            xoTurn = 'x';
            document.getElementById('xo-info').innerText = "دور اللاعب: X";
            myWords.forEach(w => {
                const c = document.createElement('div');
                c.className = 'cell';
                c.innerText = w;
                c.onclick = () => {
                    if(!c.classList.contains('occupied')) {
                        say(c.innerText);
                        c.innerText = xoTurn.toUpperCase();
                        c.classList.add('occupied', xoTurn);
                        xoTurn = xoTurn === 'x' ? 'o' : 'x';
                        document.getElementById('xo-info').innerText = `دور اللاعب: ${xoTurn.toUpperCase()}`;
                    }
                };
                g.appendChild(c);
            });
        }

        // --- الجزء 2: التحليل ---
        let aIndex = 0;
        function loadA() {
            const word = myWords[aIndex];
            const display = document.getElementById('a-word-display');
            const slots = document.getElementById('a-slots');
            const opts = document.getElementById('a-options');
            const msg = document.getElementById('a-msg');

            display.innerText = word;
            slots.innerHTML = '';
            opts.innerHTML = '';
            msg.innerText = '';

            // استخراج الحروف مع حركاتها (دمج الحرف مع الفتحة)
            const charsWithFatha = word.match(/.[َُِّ]/g);

            charsWithFatha.forEach((char, i) => {
                const s = document.createElement('div');
                s.className = 'slot';
                s.dataset.ans = char;
                s.ondragover = e => e.preventDefault();
                s.ondrop = e => handleDrop(e, 'a');
                slots.appendChild(s);

                const o = document.createElement('div');
                o.className = 'chip';
                o.innerText = char;
                o.draggable = true;
                o.id = 'a-opt-' + i;
                o.ondragstart = e => e.dataTransfer.setData('tid', e.target.id);
                opts.appendChild(o);
            });
            shuffle(opts);
        }

        function handleDrop(e, type) {
            e.preventDefault();
            const tid = e.dataTransfer.getData('tid');
            if(!tid) return;
            const dragged = document.getElementById(tid);
            const target = e.target;

            if(target.classList.contains('slot') && dragged.innerText === target.dataset.ans) {
                target.innerText = dragged.innerText;
                target.style.background = 'var(--pastel-green)';
                target.style.borderStyle = 'solid';
                dragged.style.visibility = 'hidden';
                checkWin(type);
            } else {
                showMsg(type, "❌ حاول مرة أخرى");
            }
        }

        function checkWin(type) {
            const allSlots = document.querySelectorAll(`#${type}-slots .slot`);
            const complete = Array.from(allSlots).every(s => s.innerText !== '');
            if(complete) {
                showMsg(type, "🌟 ممتاز! تحليل صحيح");
                say("أحسنت");
            }
        }

        // --- الجزء 3: المقطع الناقص ---
        let cIndex = 0;
        function loadC() {
            const word = myWords[cIndex];
            const display = document.getElementById('c-word-display');
            const opts = document.getElementById('c-options');
            const msg = document.getElementById('c-msg');
            
            opts.innerHTML = '';
            msg.innerText = '';

            const parts = word.match(/.[َُِّ]/g);
            const hiddenChar = parts[1]; // الحرف الأوسط

            display.innerHTML = `
                <span>${parts[0]}</span>
                <div class="slot" id="c-target" data-ans="${hiddenChar}" style="display:inline-flex; vertical-align:middle; margin:0 10px;"></div>
                <span>${parts[2]}</span>
            `;

            const target = document.getElementById('c-target');
            target.ondragover = e => e.preventDefault();
            target.ondrop = e => {
                e.preventDefault();
                const tid = e.dataTransfer.getData('tid');
                const dragged = document.getElementById(tid);
                if(dragged.innerText === hiddenChar) {
                    target.innerText = hiddenChar;
                    target.style.background = 'var(--pastel-green)';
                    showMsg('c', "🎉 رائع! اكتملت الكلمة");
                    say(word);
                } else {
                    showMsg('c', "❌ ليس هذا المقطع");
                }
            };

            const choices = [hiddenChar, "مَ", "سَ", "بَ", "تَ"].slice(0, 4);
            choices.forEach((c, i) => {
                const o = document.createElement('div');
                o.className = 'chip';
                o.innerText = c;
                o.draggable = true;
                o.id = 'c-opt-' + i;
                o.ondragstart = e => e.dataTransfer.setData('tid', e.target.id);
                opts.appendChild(o);
            });
            shuffle(opts);
        }

        function shuffle(parent) {
            for (let i = parent.children.length; i >= 0; i--) {
                parent.appendChild(parent.children[Math.random() * i | 0]);
            }
        }

        function showMsg(type, txt) {
            const m = document.getElementById(type + '-msg');
            m.innerText = txt;
            if(txt.includes('❌')) setTimeout(() => m.innerText = '', 1500);
        }

        function say(t) {
            const s = new SpeechSynthesisUtterance(t);
            s.lang = 'ar-SA';
            window.speechSynthesis.speak(s);
        }

        function nextA() { aIndex = (aIndex + 1) % myWords.length; loadA(); }
        function nextC() { cIndex = (cIndex + 1) % myWords.length; loadC(); }

        buildXO(); loadA(); loadC();
    </script>
</body>
</html>
